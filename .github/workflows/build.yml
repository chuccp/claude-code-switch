name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: claude-code-switch-win
            runtime: win-x64
          - os: ubuntu-latest
            artifact_name: claude-code-switch-linux
            runtime: linux-x64
          - os: macos-latest
            artifact_name: claude-code-switch-osx-x64
            runtime: osx-x64
          - os: macos-latest
            artifact_name: claude-code-switch-osx-arm64
            runtime: osx-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 还原依赖
        shell: bash
        run: dotnet restore claude-code-switch/claude-code-switch.csproj

      - name: 构建项目
        shell: bash
        run: dotnet build claude-code-switch/claude-code-switch.csproj -c Release --no-restore

      - name: 发布应用 (${{ matrix.runtime }})
        shell: bash
        run: |
          dotnet publish claude-code-switch/claude-code-switch.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish

      - name: 创建 macOS .app bundle
        if: startsWith(matrix.runtime, 'osx-')
        shell: bash
        run: |
          APP_NAME="claude-code-switch"
          ARCH_NAME="${{ matrix.runtime }}"
          APP_DIR="./publish/${APP_NAME}.app"

          # 创建 .app 目录结构
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          # 移动可执行文件
          mv ./publish/claude-code-switch "${APP_DIR}/Contents/MacOS/"

          # 复制图标
          cp ../claude-code-switch/Assets/claude-code-switch.icns "${APP_DIR}/Contents/Resources/" 2>/dev/null || true

          # 创建 Info.plist
          cat > "${APP_DIR}/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>claude-code-switch</string>
              <key>CFBundleIconFile</key>
              <string>claude-code-switch.icns</string>
              <key>CFBundleIdentifier</key>
              <string>com.claude-code-switch.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>claude-code-switch</string>
              <key>CFBundleDisplayName</key>
              <string>claude-code-switch</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</key>
              <key>CSResourcesFileMapped</key>
              <true/>
          </dict>
          </plist>
          EOF

          # 删除 quarantine 属性，解决 Gatekeeper 阻止问题
          xattr -cr "${APP_DIR}" 2>/dev/null || true

          # 删除其他多余文件
          find ./publish -maxdepth 1 -type f -delete 2>/dev/null || true

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: claude-code-switch-win
          path: ./artifacts/claude-code-switch-win

      - name: 下载 Linux 产物
        uses: actions/download-artifact@v4
        with:
          name: claude-code-switch-linux
          path: ./artifacts/claude-code-switch-linux

      - name: 下载 macOS x64 产物
        uses: actions/download-artifact@v4
        with:
          name: claude-code-switch-osx-x64
          path: ./artifacts/claude-code-switch-osx-x64

      - name: 下载 macOS arm64 产物
        uses: actions/download-artifact@v4
        with:
          name: claude-code-switch-osx-arm64
          path: ./artifacts/claude-code-switch-osx-arm64

      - name: 列出目录结构
        run: |
          ls -la ./artifacts/
          ls -la ./artifacts/claude-code-switch-osx-x64/
          find ./artifacts -name "*.app"

      - name: 打包 Windows 版本
        run: |
          cd ./artifacts/claude-code-switch-win
          zip -9 -y ../claude-code-switch-win.zip -r ./*

      - name: 打包 Linux 版本
        run: |
          cd ./artifacts/claude-code-switch-linux
          zip -9 -y ../claude-code-switch-linux.zip -r ./*

      - name: 打包 macOS x64 版本
        run: |
          pwd
          ls -la ./artifacts/claude-code-switch-osx-x64/
          find ./artifacts/claude-code-switch-osx-x64 -name "*.app"
          cd ./artifacts/claude-code-switch-osx-x64
          zip -9 -y ../claude-code-switch-osx-x64.zip -r claude-code-switch.app

      - name: 打包 macOS arm64 版本
        run: |
          cd ./artifacts/claude-code-switch-osx-arm64
          zip -9 -y ../claude-code-switch-osx-arm64.zip -r claude-code-switch.app

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/claude-code-switch-win.zip
            ./artifacts/claude-code-switch-linux.zip
            ./artifacts/claude-code-switch-osx-x64.zip
            ./artifacts/claude-code-switch-osx-arm64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}